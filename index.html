<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maine Trumpet Lessons</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #f3f0e9;
    --paper-2: #ece8de;
    --card: #faf8f3;
    --ink: #0c2a28;
    --teal: #0d3b3b;
    --teal-2: #134a48;
    --muted: #5c6f6c;
    --line: #d9d3c6;
    --line-dark: #234a47;
    --accent: #e0843c;
    --accent-deep: #c66a26;
    --radius: 14px;
    --maxw: 1180px;
    --sans: -apple-system, BlinkMacSystemFont, 'Figtree', 'Segoe UI', system-ui, sans-serif;
    --mono: -apple-system, BlinkMacSystemFont, 'Figtree', 'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body { overflow-x: hidden; }

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  ::selection { background: var(--accent); color: #fff; }

  /* ---------- shared layout ---------- */
  .wrap { width: 100%; max-width: var(--maxw); margin: 0 auto; padding: 0 40px; }

  .eyebrow {
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent-deep);
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .eyebrow::before {
    content: "";
    width: 26px; height: 1px;
    background: var(--accent);
    display: inline-block;
  }
  .eyebrow-lg { font-size: 24px; line-height: 1.4; font-weight: 700; letter-spacing: 0.16em; }

  h1, h2, h3 { font-weight: 700; letter-spacing: -0.02em; line-height: 1.04; margin: 0; }
  p { margin: 0; }
  .lede { font-size: clamp(1.05rem, 1.6vw, 1.3rem); line-height: 1.55; color: var(--muted); font-weight: 400; }

  /* ---------- nav ---------- */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: color-mix(in srgb, var(--paper) 86%, transparent);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 78px; gap: 16px; }
  .wordmark {
    font-weight: 800;
    font-size: clamp(1.08rem, 1.6vw, 1.4rem);
    letter-spacing: 0.015em;
    text-transform: uppercase;
    line-height: 1;
    color: var(--ink);
    cursor: pointer;
    white-space: nowrap;
    transition: color .18s;
  }
  .wordmark:hover { color: var(--accent-deep); }
  .wordmark small {
    display: block;
    font-family: var(--mono);
    font-weight: 600;
    font-size: 0.72rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 5px;
    text-align: center;
  }
  .brand { display: flex; align-items: center; gap: 13px; cursor: pointer; }
  .brand-mark {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--teal); color: var(--paper);
    display: grid; place-items: center;
    font-family: var(--mono); font-weight: 700; font-size: 0.95rem;
    flex-shrink: 0;
  }
  .brand-name { font-weight: 700; font-size: 1.02rem; letter-spacing: -0.01em; line-height: 1.05; }
  .brand-name small { display: block; font-family: var(--mono); font-weight: 400; font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }

  .nav-links { display: flex; align-items: center; gap: 2px; }
  .nav-link {
    font-size: 0.88rem; font-weight: 500; color: var(--muted);
    padding: 8px 11px; border-radius: 9px; transition: color .18s, background .18s;
    position: relative; white-space: nowrap;
  }
  .nav-link:hover { color: var(--ink); }
  .nav-link.active { color: var(--ink); font-weight: 700; }
  .nav-link.active::after {
    content: ""; position: absolute; left: 11px; right: 11px; bottom: -1px;
    height: 4px; background: var(--accent); border-radius: 3px;
  }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 9px;
    font-weight: 600; font-size: 0.95rem; letter-spacing: 0.01em;
    border: none; border-radius: 999px; padding: 13px 26px;
    transition: transform .15s ease, box-shadow .2s ease, background .2s;
    white-space: nowrap;
  }
  .btn-accent { background: var(--accent); color: #fff; box-shadow: 0 1px 0 var(--accent-deep); }
  .btn-accent:hover { background: var(--accent-deep); transform: translateY(-1px); box-shadow: 0 8px 22px -10px var(--accent-deep); }
  .btn-ink { background: var(--teal); color: var(--paper); }
  .btn-ink:hover { background: var(--teal-2); transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
  .btn-ghost:hover { border-color: var(--ink); }
  .btn-lg { padding: 17px 34px; font-size: 1.02rem; }
  .nav-cta { letter-spacing: 0.05em; font-weight: 700; padding: 11px 20px; margin-left: 6px; }

  /* ---------- page transitions ---------- */
  /* Entrance fade is opt-in via JS (.page.in) so an inactive/paused iframe never
     holds content on the hidden start-frame — base state is fully visible. */
  .page { opacity: 1; }
  @media (prefers-reduced-motion: no-preference) {
    .page.in { animation: fade .45s ease; }
  }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .section { padding: 96px 0; }
  .section-sm { padding: 64px 0; }

  /* ---------- placeholder ---------- */
  .ph {
    position: relative; overflow: hidden; border-radius: var(--radius);
    background-color: var(--paper-2);
    background-image: repeating-linear-gradient(135deg, transparent 0 11px, color-mix(in srgb, var(--teal) 7%, transparent) 11px 12px);
    border: 1px solid var(--line);
    display: grid; place-items: center;
  }
  .ph span {
    font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); background: var(--card); padding: 6px 12px; border-radius: 999px; border: 1px solid var(--line);
  }

  /* ---------- footer ---------- */
  .footer { background: var(--teal); color: var(--paper); padding: 70px 0 40px; margin-top: 40px; }
  .footer a { color: color-mix(in srgb, var(--paper) 78%, transparent); }
  .footer a:hover { color: #fff; }
  .footer-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 40px; padding-bottom: 48px; border-bottom: 1px solid var(--line-dark); }
  .footer-col h4 { font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: color-mix(in srgb, var(--paper) 60%, transparent); margin: 0 0 16px; font-weight: 400; }
  .footer-col a { display: block; padding: 5px 0; font-size: 0.95rem; }
  .footer-bottom { display: flex; align-items: center; justify-content: space-between; padding-top: 28px; font-size: 0.85rem; color: color-mix(in srgb, var(--paper) 62%, transparent); }
  .made-love { font-family: var(--mono); font-size: 0.8rem; letter-spacing: 0.04em; }
  .made-love b { color: var(--accent); }

  /* ---------- cards / lists ---------- */
  .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); }

  .field { display: flex; flex-direction: column; gap: 8px; }
  .field label { font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
  .field input, .field textarea {
    font-family: var(--sans); font-size: 1rem; color: var(--ink);
    background: var(--card); border: 1px solid var(--line); border-radius: 11px;
    padding: 14px 16px; transition: border .18s, box-shadow .18s; width: 100%;
  }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent); }
  .field.err input, .field.err textarea { border-color: #c0392b; }
  .field .msg { font-size: 0.78rem; color: #c0392b; min-height: 1em; }

  /* testimonials — 3 on top, last 2 centered beneath, equal heights per row */
  .testimonial-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 26px;
    align-items: stretch;
  }
  .testimonial-grid > * { grid-column: span 2; }
  .testimonial-grid > *:nth-child(4) { grid-column: 2 / span 2; }
  .testimonial-grid > *:nth-child(5) { grid-column: 4 / span 2; }
  @media (max-width: 980px) {
    .testimonial-grid { grid-template-columns: repeat(2, 1fr); }
    .testimonial-grid > *,
    .testimonial-grid > *:nth-child(4),
    .testimonial-grid > *:nth-child(5) { grid-column: auto; }
    .testimonial-grid > *:nth-child(5) { grid-column: 1 / -1; max-width: 50%; justify-self: center; }
  }
  @media (max-width: 640px) {
    .testimonial-grid { grid-template-columns: 1fr; }
    .testimonial-grid > *:nth-child(5) { max-width: none; }
  }

  @media (max-width: 820px) {
    .wrap { padding: 0 22px; }
    .nav-links .nav-link { display: none; }
    .nav-links .nav-link.contact-keep { display: inline-flex; }
    .footer-grid { grid-template-columns: 1fr; gap: 30px; }
    .footer-bottom { flex-direction: column; gap: 14px; align-items: flex-start; }
    .section { padding: 64px 0; }
  }
</style>
</head>

</body>
