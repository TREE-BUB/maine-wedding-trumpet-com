<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script>
    // Redirect unknown paths back to index.html, encoding the path so React Router can restore it
    var path = window.location.pathname + window.location.search;
    var hash = window.location.hash;
    sessionStorage.setItem('redirect', path + hash);
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
